services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"

  tg-bot:
    build: ./tg-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    profiles: [bot]

  tg-webapp:
    build: ./tg-bot/webapp
    restart: unless-stopped
    ports:
      - "3001:80"

  tablet:
    build: ./tablet
    restart: unless-stopped
    ports:
      - "3002:80"

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
      - tg-webapp
      - tablet

volumes:
  postgres_data:
